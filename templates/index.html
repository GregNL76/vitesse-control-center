<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vitesse Control Center</title>

<style>

body{

    margin:0;
    padding:40px;

    font-family:Arial,Helvetica,sans-serif;

    background:#f2f4f8;
}

h1{

    margin-top:0;
}

.subtitle{

    color:#666;
    margin-bottom:35px;
}

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

    gap:20px;

    margin-bottom:40px;
}

.card{

    background:white;

    border-radius:12px;

    padding:25px;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

    text-align:center;
}

.card-title{

    color:#666;

    font-size:14px;

    margin-bottom:15px;
}

.card-value{

    font-size:40px;

    font-weight:bold;

    color:#1565c0;
}

.actions{

    margin-top:20px;
}

.actions h2{

    margin-bottom:20px;
}

.buttons{

    display:flex;

    flex-wrap:wrap;

    gap:15px;
}

button{

    background:#1976d2;

    color:white;

    border:none;

    border-radius:8px;

    padding:14px 24px;

    font-size:15px;

    cursor:pointer;

    transition:.2s;
}

button:hover{

    background:#0d47a1;
}

.footer{

    margin-top:60px;

    color:#888;

    font-size:13px;
}

</style>

</head>

<body>

<h1>Vitesse Control Center</h1>

<p class="subtitle">

Nintendo Switch Library Management

</p>

<div class="cards">

<div class="card">

<div class="card-title">Games</div>

<div class="card-value">{{ stats.games }}</div>

</div>

<div class="card">

<div class="card-title">Base Games</div>

<div class="card-value">{{ stats.base_games }}</div>

</div>

<div class="card">

<div class="card-title">Updates</div>

<div class="card-value">{{ stats.updates }}</div>

</div>

<div class="card">

<div class="card-title">Orphans</div>

<div class="card-value">{{ stats.orphan_updates }}</div>

</div>

<div class="card">

<div class="card-title">Duplicates</div>

<div class="card-value">{{ stats.duplicate_updates }}</div>

</div>

</div>

<div class="actions">

<h2>Actions</h2>

<div class="buttons">

<button disabled>Scan Library</button>

<form action="/refresh-titledb" method="post">

    <button type="submit">

        Refresh TitleDB

    </button>

</form>

<button disabled>Run Update Auditor</button>

<button disabled>Reports</button>

</div>

</div>

<div class="footer">

Vitesse Control Center • Development Build

</div>

</body>

</html>
